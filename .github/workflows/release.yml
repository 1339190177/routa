name: Routa Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version to release, ex: 0.2.4 or v0.2.4"
        required: true
        type: string
      publish_cli:
        description: "Publish npm CLI packages"
        required: false
        default: true
        type: boolean
      publish_desktop:
        description: "Publish desktop release assets"
        required: false
        default: true
        type: boolean

jobs:
  resolve-version:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ -n "${INPUT_VERSION}" ]]; then
            version="${INPUT_VERSION#v}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          if [[ -z "${version}" ]]; then
            echo "Unable to resolve release version" >&2
            exit 1
          fi

          echo "value=${version}" >> "$GITHUB_OUTPUT"

  release-desktop:
    name: Release desktop
    needs: resolve-version
    if: |
      github.event_name == 'push' ||
      github.event.inputs.publish_desktop == 'true' ||
      github.event.inputs.publish_desktop == true
    uses: ./.github/workflows/tauri-release.yml
    with:
      version: ${{ needs.resolve-version.outputs.version }}
    secrets: inherit

  release-cli:
    name: Release CLI
    needs: resolve-version
    if: |
      github.event_name == 'push' ||
      github.event.inputs.publish_cli == 'true' ||
      github.event.inputs.publish_cli == true
    uses: ./.github/workflows/cli-release.yml
    with:
      version: ${{ needs.resolve-version.outputs.version }}
      publish: true
    secrets: inherit
