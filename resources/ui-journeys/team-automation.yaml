id: team-automation
goal: >
  在 team 页面触发协作链路并验证 session 状态反馈、参与者可见信息和页面交互一致性。
entry_url: "http://localhost:3000/workspace/default/team"
preconditions:
  - "team 页面可访问"
  - "存在可触发团队自动化的入口"
success_signals:
  - "触发团队流程成功"
  - "可见协作状态更新（提示/卡片/日志）"
  - "页面保持可继续交互，无明显卡死"
failure_signals:
  - "提交后无状态变化"
  - "提示信息错误或不可读"
  - "出现页面白屏、重复错误对话框或 500"
score_rubric: |
  重点关注：
  1. 从触发到反馈是否连贯
  2. 团队协作信息是否清晰可追踪
  3. 反馈状态是否可验证且一致
  4. 页面是否能在流程中恢复并继续交互
