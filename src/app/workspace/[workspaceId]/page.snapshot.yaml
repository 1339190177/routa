    - text: Idle Add Python Agent Runtime Support to Routa.js medium
    - paragraph: "## Problem Statement Routa.js currently supports TypeScript/JavaScript agents and Rust-based coordination. Users need to create and run Python-based agents to leverage Python's rich ecosystem (ML, data science, scientific computing) within the Routa multi-agent coordination platform. ## Why Now - Enable Python-first users to contribute agents without learning TypeScript/Rust - Leverage existing Python AI/ML libraries (PyTorch, TensorFlow, scikit-learn) in agent implementations - Expand agent ecosystem beyond JS/TS languages ## Context - **Current behavior:** Agents must be implemented in TypeScript/JavaScript or interact via API - **Desired behavior:** Python agents can be created, registered, and coordinated alongside TS/JS agents - **Related files:** - `src/agents/` - Agent coordination logic - `src/worker/` - Agent worker implementation - `src/types/agent.ts` - Agent type definitions - **Related history:** None found after searching docs/issues/ ## Proposed Approaches ### Approach 1: Python MCP Server (Recommended) **Description:** Implement a Python MCP (Model Context Protocol) server that exposes agent capabilities. Python agents run as separate processes connected via stdio IPC. Rust/Axum backend manages agent lifecycles. **Pros:** - Leverages existing MCP infrastructure - Isolated execution (process-level sandbox) - Language-agnostic protocol - Easy to add other languages later (Ruby, Go, etc.) **Cons:** - Requires MCP client integration on Rust side - Inter-process communication overhead - Need to serialize/deserialize messages **Effort:** Medium **Libraries:** - `mcp` (Python package) - Existing Rust MCP SDK ### Approach 2: Python Worker Bridge **Description:** Create a dedicated Python worker service that accepts task assignments from Rust backend via REST/WebSocket API. Python maintains its own agent pool and task execution state. **Pros:** - Decoupled architecture - Can scale Python workers independently - Clear separation of concerns **Cons:** - Additional deployment component - More complex orchestration (two worker pools) - Requires cross-language API contract maintenance **Effort:** Large **Libraries:** - `fastapi` for REST/WS API - `uvicorn` as ASGI server ### Approach 3: Embedded Python via PyO3 **Description:** Use PyO3 to embed Python runtime directly in Rust backend. Python agents execute as native Rust modules calling into Python interpreter. **Pros:** - Single deployment (no extra service) - Zero-latency communication (in-process) - Shared memory possible for performance **Cons:** - Tightly coupled (Python runtime in Rust process) - GIL limits true parallelism - Safety concerns (Python errors can crash backend) - Complex build setup **Effort:** Large **Libraries:** - `pyo3` crate ## Recommendation **Approach 1 (Python MCP Server)** is recommended because: 1. Aligns with existing MCP architecture patterns in Routa.js 2. Provides clear isolation and fault boundaries 3. Extensible to other languages in future 4. Lower implementation complexity than Approach 3 5. Better fit for multi-agent orchestration than Approach 2 ## Acceptance Criteria - [ ] Python agent template project created with MCP server scaffolding - [ ] Python agent can register with Routa coordinator - [ ] Python agent can receive and execute tasks - [ ] Python agent can report completion back to coordinator - [ ] Example \"hello world\" Python agent implemented - [ ] Documentation for creating Python agents - [ ] Integration tests covering Python agent lifecycle ## Out of Scope - Python-specific UI for agent creation (use existing UI) - Hot reloading of Python agents - Python agent debugging tools - Performance optimization for high-throughput scenarios"
