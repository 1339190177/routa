    - text: Live GitHub Issues Sync + CI Status Integration for Kanban Board medium
    - paragraph: "## Problem Statement Currently, the Routa.js Kanban board operates independently of GitHub issues. Developers work in two disconnected systems: - GitHub issues for task tracking and CI/CD visibility - Routa Kanban board for agent coordination and task execution This disconnect creates friction when using Codex agents to work on GitHub issues—there's no automatic sync, no CI status visibility, and no seamless way to select GitHub issues for agent execution. ## Objective Build a closed-loop integration between GitHub Issues and the Routa Kanban board, enabling GitHub-driven development workflows with full CI visibility and Codex agent execution capabilities. ## Scope ### In Scope 1. **GitHub Issue Import/Sync** - Sync all open issues from `phodal/routa` repository - Display issues in Kanban board (configurable: all/open/assigned) - Maintain bidirectional link between cards and GitHub issues - Handle issue state changes (open/closed) → card status updates 2. **CI Status Display** - Fetch and display GitHub Actions status for each issue - Show CI badge/status indicator on task cards - Link to full workflow run logs - Handle multiple workflow runs per issue (via branch/PR association) 3. **Codex Integration** - Select GitHub issue from Kanban → spawn Codex agent with issue context - Auto-populate agent task from issue body/labels - Create PR/comments back to GitHub when agent completes ### Affected Areas - Frontend: Kanban board UI components, card detail views - Backend: GitHub API integration, CI status polling - MCP tools: New tools for GitHub sync and CI status queries - Database: Schema changes to store GitHub issue mappings ### Out of Scope - GitHub PR management (review, merge controls) - Issue creation from Kanban (unidirectional sync only) - Real-time webhook-based updates (polling initially) - Multi-repo support (single repo: `phodal/routa`) ## Acceptance Criteria 1. ✅ Kanban board displays all open issues from `phodal/routa` with titles, labels, and status 2. ✅ Each issue card shows current GitHub Actions CI status (passing/failing/running/pending) 3. ✅ Clicking a CI status indicator opens the GitHub Actions workflow run page 4. ✅ Selecting an issue from Kanban creates a Codex agent session with issue context 5. ✅ Issue number and link are visible on all synced cards 6. ✅ GitHub issue closure syncs to Kanban (card moves to Done or archived) 7. ✅ Configuration exists for GitHub repo owner/name and API token ## Implementation Notes ### Technical Approach - Use GitHub REST API: `/repos/{owner}/{repo}/issues`, `/repos/{owner}/{repo}/actions/runs` - Store GitHub issue metadata in card metadata (issue number, URL, last sync timestamp) - CI status mapping: branch/commit → workflow runs → issue association - Poll GitHub API every 5-10 minutes for updates (webhooks later) ### Key Files to Modify - Frontend: `src/components/kanban/` - Card components, board view - Backend (Rust): `crates/routa-server/` - GitHub API client, sync service - MCP Tools: New tools in `src/mcp/` or Rust equivalent ### Configuration Required - Environment variable for GitHub personal access token (classic or fine-grained) - Repo configuration: owner=`phodal`, repo=`routa` - Polling interval configuration ## Dependencies - GitHub personal access token with `repo:status`, `repo:issues`, `actions:read` scopes - Existing GitHub integration libraries (if any) in the codebase"
